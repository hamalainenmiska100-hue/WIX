name: Build IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          mkdir -p build

          xcodebuild \
            -project WIX.xcodeproj \
            -scheme WIX \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/WIX.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create unsigned IPA
        run: |
          mkdir Payload
          cp -r build/WIX.xcarchive/Products/Applications/WIX.app Payload/
          zip -r WIX.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WIX-IPA
          path: WIX.ipa
