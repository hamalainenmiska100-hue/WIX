name: Build iOS IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          mkdir -p build

          xcodebuild \
            -project WIX.xcodeproj \
            -scheme WIX \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/WIX.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA manually
        run: |
          mkdir Payload
          cp -r build/WIX.xcarchive/Products/Applications/WIX.app Payload/
          zip -r WIX.ipa Payload
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WIX-ipa
          path: WIX.ipa