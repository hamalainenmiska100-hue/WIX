name: WIX
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.wix
    PRODUCT_NAME: WIX
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    TARGETED_DEVICE_FAMILY: 1,2
    SUPPORTS_MACCATALYST: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
packages: {}
targets:
  WIX:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WIX
        excludes:
          - Resources/Assets.xcassets
    resources:
      - WIX/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: WIX/Resources/Info.plist
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - '@executable_path/Frameworks'
    info:
      path: WIX/Resources/Info.plist
      properties:
        CFBundleDisplayName: WIX!
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: false
        NSPhotoLibraryUsageDescription: WIX tarvitsee kuvakirjaston, jotta voit lähettää kuvia analysoitavaksi.
        NSCameraUsageDescription: WIX voi käyttää kameraa myöhemmin kuvien lisäämistä varten.
        NSSupportsLiveActivities: false
    scheme:
      gatherCoverageData: false
      testTargets: []
